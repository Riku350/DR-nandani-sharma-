<!DOCTYPE html>
<html>
<head>
<title>Nandani 💖</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI';
  text-align:center;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  color:#fff;
}

.card {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:20px;
  margin:50px auto;
  width:90%;
  max-width:400px;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
}

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
  background:#ff4b5c;
  color:white;
}

button:hover {
  transform:scale(1.1);
}

input {
  padding:10px;
  border-radius:10px;
  border:none;
  width:80%;
}

.hidden { display:none; }

.back {
  background:#333;
}
</style>

</head>

<body>

<div class="card" id="step1">
<h2>💖 Nandani khana kha li? 🍽️</h2>
<button onclick="next('step2')">Haa</button>
<button onclick="gussa()">Naa</button>
</div>

<div class="card hidden" id="step2">
<h2>📚 Padhai kar rahi ho?</h2>
<button onclick="next('step3')">Haa</button>
<button onclick="gussa()">Nind aa rahi 😴</button>
<br>
<button class="back" onclick="back('step1')">⬅ Back</button>
</div>

<div class="card hidden" id="step3">
<h2>🏠 Ghar pe sab thik hai?</h2>
<button onclick="next('step4')">Haa</button>
<button onclick="gussa()">Naa</button>
<br>
<button class="back" onclick="back('step2')">⬅ Back</button>
</div>

<div class="card hidden" id="step4">
<h2>😂 Bhaiya exam dene gaye?</h2>
<button onclick="next('step5')">Haa</button>
<button onclick="gussa()">Naa</button>
<br>
<button class="back" onclick="back('step3')">⬅ Back</button>
</div>

<div class="card hidden" id="step5">
<h2>💝 Miss you Nandani?</h2>
<button onclick="next('step6')">Bahut 😍</button>
<button onclick="gussa()">Naa</button>
<br>
<button class="back" onclick="back('step4')">⬅ Back</button>
</div>

<div class="card hidden" id="step6">
<h2>🎁 Tumhe kya chahiye?</h2>
<input type="text" id="gift" placeholder="Apni pasand likho">
<br><br>
<button onclick="final()">Submit</button>
</div>

<h2 id="result"></h2>

<!-- Funny Sound -->
<audio id="sound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>

function next(step){
  document.querySelectorAll('.card').forEach(e=>e.classList.add('hidden'));
  document.getElementById(step).classList.remove('hidden');
  document.getElementById("sound").play();
}

function back(step){
  document.querySelectorAll('.card').forEach(e=>e.classList.add('hidden'));
  document.getElementById(step).classList.remove('hidden');
}

function gussa(){
  document.getElementById("result").innerHTML="😡😡 Aisa nahi chalega!";
  document.getElementById("sound").play();
}

function final(){
  let gift=document.getElementById("gift").value;
  document.getElementById("result").innerHTML=
  "💖 Nandani tum best ho 💖<br> Tumhari pasand: "+gift+" 🎁<br> Main jarur dilaunga 😘";
}

</script>

</body>
</html>
